# ─── Backend Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-backend
  namespace: ai-devops
  labels:
    app: ai-devops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-devops-backend
    spec:
      containers:
        - name: backend
          image: ai-devops-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-devops-config
            - secretRef:
                name: ai-devops-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
# ─── Frontend Deployment ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-frontend
  namespace: ai-devops
  labels:
    app: ai-devops-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-frontend
  template:
    metadata:
      labels:
        app: ai-devops-frontend
    spec:
      containers:
        - name: frontend
          image: ai-devops-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
