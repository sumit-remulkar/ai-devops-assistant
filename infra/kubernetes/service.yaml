# ─── Backend Service ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ai-devops-backend-service
  namespace: ai-devops
spec:
  selector:
    app: ai-devops-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
# ─── Frontend Service ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ai-devops-frontend-service
  namespace: ai-devops
spec:
  selector:
    app: ai-devops-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
